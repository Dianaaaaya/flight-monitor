name: flight-monitor

on:
  schedule:
    # 时间表贴着航司调价时点（ATPCO：工作日 10:00/12:30/20:00 ET，周末 17:00 ET）。
    # 下面是 UTC 时间（美东夏令时 EDT = UTC-4）。注释里是对应的 ET。
    # 每个调价窗口"前+后"各抓一次，便于判断"比上次降价"。
    # 14 次/天 ×2 请求（完整往返）×7 天 = 196 次，在 SerpApi 免费额度（250/月）内。
    - cron: "30 4 * * *"    # 00:30 ET  夜间库存重定价
    - cron: "30 10 * * *"   # 06:30 ET  清晨
    - cron: "55 13 * * *"   # 09:55 ET  10:00 调价前（基线）
    - cron: "15 14 * * *"   # 10:15 ET  10:00 调价后
    - cron: "45 14 * * *"   # 10:45 ET  复核
    - cron: "25 16 * * *"   # 12:25 ET  12:30 调价前
    - cron: "45 16 * * *"   # 12:45 ET  12:30 调价后
    - cron: "15 17 * * *"   # 13:15 ET  复核
    - cron: "55 20 * * *"   # 16:55 ET  17:00 调价前（周末唯一调价点）
    - cron: "15 21 * * *"   # 17:15 ET  17:00 调价后
    - cron: "55 23 * * *"   # 19:55 ET  20:00 调价前
    - cron: "15 0 * * *"    # 20:15 ET  20:00 调价后
    - cron: "45 0 * * *"    # 20:45 ET  复核
    - cron: "30 2 * * *"    # 22:30 ET  晚间
  workflow_dispatch: {}   # 允许在 Actions 页面手动触发一次

# 允许把更新后的 data/prices.json 提交回仓库
permissions:
  contents: write

# 避免上一次还没跑完又触发下一次
concurrency:
  group: flight-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run monitor
        env:
          PROVIDER: serpapi
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          NOTIFY_CHANNEL: telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run.py

      - name: Commit updated price history
        run: |
          git config user.name "flight-monitor-bot"
          git config user.email "actions@github.com"
          git add data/prices.json
          git diff --staged --quiet || git commit -m "chore: update price history [skip ci]"
          git push
